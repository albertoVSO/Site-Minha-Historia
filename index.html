<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa História ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #ff4b5c, #ff9a9e);
    color: #5a0f14;
    overflow-x: hidden;
}

/* INTRO ANIMAÇÃO */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: radial-gradient(circle, #0f2027, #000);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    z-index: 9999;
}

.flowers {
    display: flex;
    gap: 40px;
    margin-bottom: 80px;
}

.flower {
    position: relative;
    width: 80px;
    height: 160px;
    animation: subir 2s ease-out forwards;
}

.flower::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 6px;
    height: 120px;
    background: linear-gradient(to top, #14532d, #22c55e);
    transform: translateX(-50%);
}

.flower::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, pink, #ff4b5c);
    border-radius: 50%;
    transform: translateX(-50%) scale(0);
    animation: abrir 1s ease forwards;
    animation-delay: 1.5s;
}

@keyframes subir {
    from { transform: translateY(120px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes abrir {
    to { transform: translateX(-50%) scale(1); }
}

#conteudo {
    display: none;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 40px 30px;
    background: rgba(255,245,247,0.97);
    border-radius: 22px;
    box-shadow: 0 18px 45px rgba(192,57,43,0.35);
}

h1 {
    text-align: center;
    color: #c0392b;
}

p {
    font-size: 18px;
    line-height: 1.9;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 22px;
    margin: 40px 0;
}

.galeria img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 20px;
}

.coracao {
    position: fixed;
    bottom: -20px;
    animation: subirCoracao 6s linear infinite;
}

@keyframes subirCoracao {
    to { transform: translateY(-120vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="flowers">
    <div class="flower"></div>
    <div class="flower"></div>
    <div class="flower"></div>
  </div>
</div>

<!-- CONTEÚDO -->
<div id="conteudo">

<audio controls autoplay loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="container">
<h1>Nossa História</h1>

<p>eu conheci ela num churrasco com amigos eu estava bêbado e só conseguia reparar nela e naqueles olhos completamente apaixonantes...</p>

<div class="galeria">
<img src="foto1.jpeg">
<img src="foto2.jpeg">
</div>

<p>começamos a conversar praticamente no aniversário dela...</p>

</div>

</div>

<script>
/* TROCA DE TELA */
setTimeout(() => {
    document.getElementById('intro').style.opacity = '0';
    document.getElementById('intro').style.transition = '1s';

    setTimeout(() => {
        document.getElementById('intro').style.display = 'none';
        document.getElementById('conteudo').style.display = 'block';
    }, 1000);
}, 4000);

/* CORAÇÕES */
function criarCoracao() {
    const c = document.createElement("div");
    c.className = "coracao";
    c.innerHTML = "❤️";
    c.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),6000);
}

setInterval(criarCoracao,500);
</script>

</body>
</html>
